# .github/workflows/ci.yml
# Permi Continuous Integration
#
# Runs on every push to main and on every pull request.
# Verifies that:
#   1. The package installs cleanly
#   2. The scanner engine loads all rules without errors
#   3. The scanner correctly detects known vulnerabilities in test_project/
#   4. The CLI entry point works
#   5. The package builds successfully for distribution

name: Permi CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Test on all supported platforms and Python versions ─────────────
  test:
    name: Test — Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        python-version: [ "3.9", "3.10", "3.11", "3.12" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Verify rules load correctly
        run: |
          python -c "from scanner.rules import RULES; assert len(RULES) >= 15, 'Too few rules: ' + str(len(RULES)); print('OK ---', len(RULES), 'rules loaded')"

      - name: Verify database initialises
        run: |
          python -c "from db.database import init_db; init_db(); print('OK --- database initialised')"

      - name: Verify scanner detects known vulnerabilities
        run: |
          python -c "from scanner.scan import scan; findings, raw = scan('./test_project', offline=True); assert raw >= 9, 'Too few raw findings: ' + str(raw); high = [f for f in findings if f.get('severity') == 'high']; assert len(high) >= 5, 'Too few high findings: ' + str(len(high)); print('OK ---', raw, 'raw,', len(findings), 'after filter,', len(high), 'high')"

      - name: Verify CLI help works
        run: permi --help

      - name: Verify scan command help works
        run: permi scan --help

      - name: Run CLI scan — offline mode
        run: permi scan --path ./test_project --offline --output json || true

      - name: Run CLI scan — severity filter
        run: permi scan --path ./test_project --offline --severity high || true

  # ── Job 2: Build distribution package ─────────────────────────────────────
  build:
    name: Build distribution package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          pip install -r requirements.txt
          pip install -e .

      - name: Build package
        run: python -m build

      - name: Check distribution with twine
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: permi-dist
          path: dist/
          retention-days: 7

  # ── Job 3: Scan Permi with Permi ───────────────────────────────────────────
  self-scan:
    name: Scan Permi with Permi
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Permi
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Initialise database
        run: python -c "from db.database import init_db; init_db()"

      - name: Scan scanner module
        run: permi scan --path ./scanner --offline --severity high --output json || true

      - name: Scan AI filter module
        run: permi scan --path ./ai_filter --offline --severity high --output json || true

      - name: Scan CLI module
        run: permi scan --path ./cli --offline --severity high --output json || true

      - name: Scan DB module
        run: permi scan --path ./db --offline --severity high --output json || true