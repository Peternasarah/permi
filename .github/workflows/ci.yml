# .github/workflows/ci.yml
# Permi Continuous Integration
#
# Runs on every push to main and on every pull request.
# Verifies that:
#   1. The package installs cleanly
#   2. The scanner engine loads all rules without errors
#   3. The scanner correctly detects known vulnerabilities in test_project/
#   4. The CLI entry point works
#   5. The package builds successfully for distribution

name: Permi CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Test on all supported platforms and Python versions ─────────────
  test:
    name: Test — Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        python-version: [ "3.9", "3.10", "3.11", "3.12" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Verify rules load correctly
        run: |
          python -c "
          from scanner.rules import RULES, SCANNABLE_EXTENSIONS, SKIP_DIRS
          assert len(RULES) >= 15, f'Expected at least 15 rules, got {len(RULES)}'
          print(f'OK — {len(RULES)} rules loaded')
          "

      - name: Verify database initialises
        run: |
          python -c "
          from db.database import init_db
          init_db()
          print('OK — database initialised')
          "

      - name: Run scanner on test_project (offline mode)
        run: |
          python -c "
          from scanner.scan import scan
          findings, raw_count = scan('./test_project', offline=True)
          assert raw_count >= 9, f'Expected at least 9 raw findings, got {raw_count}'
          high = [f for f in findings if f.get('severity') == 'high']
          assert len(high) >= 5, f'Expected at least 5 high findings, got {len(high)}'
          print(f'OK — {raw_count} raw findings, {len(findings)} after filter')
          "

      - name: Verify CLI entry point
        run: |
          permi --help

      - name: Verify scan command help
        run: |
          permi scan --help

      - name: Run CLI scan on test_project (offline, JSON output)
        run: |
          permi scan --path ./test_project --offline --output json

  # ── Job 2: Verify the package builds for distribution ──────────────────────
  build:
    name: Build distribution package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check distribution with twine
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: permi-dist
          path: dist/
          retention-days: 7

  # ── Job 3: Security scan Permi with Permi ──────────────────────────────────
  # Because a security tool should eat its own cooking.
  self-scan:
    name: Scan Permi with Permi
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Permi
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Scan Permi's own source code
        run: |
          permi scan --path ./scanner --offline --severity high --output json
          permi scan --path ./ai_filter --offline --severity high --output json
          permi scan --path ./cli --offline --severity high --output json
          permi scan --path ./db --offline --severity high --output json
        # We use --offline so the self-scan does not require an API key in CI.
        # High-severity findings in Permi's own code would indicate a serious
        # issue in the codebase — but we do not fail the build here since
        # Permi may flag its own intentional test patterns.
        continue-on-error: true
